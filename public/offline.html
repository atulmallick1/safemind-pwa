<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeMind — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(160deg, #eef4e8 0%, #e4eddc 35%, #f2ece2 65%, #f8f5f0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon { font-size: 64px; margin-bottom: 20px; }
    h1 {
      font-size: 28px;
      color: #2a4a25;
      margin-bottom: 12px;
    }
    p {
      font-size: 16px;
      color: #6a8a65;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .tip {
      background: rgba(122,170,110,0.1);
      border: 1px solid rgba(122,170,110,0.2);
      border-radius: 12px;
      padding: 16px;
      font-size: 14px;
      color: #3a5a35;
      line-height: 1.6;
    }
    button {
      margin-top: 20px;
      padding: 12px 32px;
      border-radius: 24px;
      border: none;
      background: #7aaa6e;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🌿</div>
    <h1>You're Offline</h1>
    <p>SafeMind needs an internet connection for the first visit. Once loaded, it works offline.</p>
    <div class="tip">
      <strong>Tip:</strong> Open SafeMind once while connected to the internet. After that, all features — breathing, grounding, screening — will work without a connection.
    </div>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
